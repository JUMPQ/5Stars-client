name: Build & Deploy (Next.js Static)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3. Enable Corepack (IMPORTANT)
      - name: Enable Corepack
        run: corepack enable

      # 4. Activate pnpm
      - name: Setup pnpm
        run: corepack prepare pnpm@9.0.0 --activate

      # 5. Verify pnpm works
      - name: Check pnpm version
        run: pnpm -v

      # 6. Install deps
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 7. Build
      - name: Build Next.js
        run: pnpm build

      # 8. Export static files
      - name: Export static files
        run: pnpm export

      # 9. Clean server
      - name: Clean server folder
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            rm -rf /home/fivestarsteams/public_html/*

      # 10. Upload
      - name: Upload to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "out/*"
          target: "/home/fivestarsteams/public_html"
